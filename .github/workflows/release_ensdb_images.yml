# Release ENSDb Docker Images
#
# Builds and publishes the ENSDb primary and replica Docker images to the
# GitHub Container Registry (ghcr.io/namehash/ensnode/ensdb-primary and
# ghcr.io/namehash/ensnode/ensdb-replica).
#
# Trigger:
# - Manual workflow_dispatch only. Run this workflow from the main branch to
#   build and publish the latest ENSDb images.
#
# Published tags:
# - On main: `latest`, branch name, and short SHA

name: Release ENSDb Docker Images

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  test:
    name: Test ENSDb replication
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run ENSDb replication smoke tests
        run: |
          cd docker/ensdb
          docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from test

      - name: Clean up test environment
        if: always()
        run: |
          cd docker/ensdb
          docker compose -f docker-compose.test.yml down --volumes

  build-and-push:
    name: Build & Push ${{ matrix.image }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ensdb-primary
            context: docker/ensdb/primary
            dockerfile: docker/ensdb/primary/Dockerfile
          - image: ensdb-replica
            context: docker/ensdb/replica
            dockerfile: docker/ensdb/replica/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Generate image tags
        id: tags
        run: |
          TAGS="type=ref,event=branch"
          TAGS="${TAGS}
          type=sha"

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS="${TAGS}
          type=raw,value=latest"
          fi

          if [[ "${{ github.ref }}" == refs/tags/ensdb/v* ]]; then
            VERSION="${GITHUB_REF_NAME#ensdb/v}"
            TAGS="${TAGS}
          type=semver,pattern={{version}},value=${VERSION}"
          fi

          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Generated tags for ${{ matrix.image }}:"
          echo "$TAGS"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          tags: ${{ steps.tags.outputs.tags }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
