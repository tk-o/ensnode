name: "Deploy: ENSNode to Blue/Green Environment on Railway platform (v2)"

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target environment (green or blue)"
        required: true
        type: choice
        options:
          - green
          - blue
      version:
        description: "Version for ENSINDEXER schema names (e.g. 1.16.0). Defaults to `tag` if omitted."
        required: false
        type: string
        default: ""
      tag:
        description: "Docker image tag to deploy. Defaults to `version`; set to a sha- tag for release-candidate images."
        required: false
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

jobs:
  deploy-environment:
    runs-on: blacksmith-4vcpu-ubuntu-2204
    env:
      TARGET_ENVIRONMENT: ${{ inputs.target }}
      # `version` names the ENSINDEXER schemas; `tag` selects the Docker images. Each defaults to the
      # other, so any one of: `version` only (normal release — images=schemas), `tag` only
      # (backward-compatible with the old single-input interface), or both (RC: sha images, version
      # schemas) works. At least one must be provided (guarded in the first step).
      VERSION: ${{ inputs.version != '' && inputs.version || inputs.tag }}
      TAG: ${{ inputs.tag != '' && inputs.tag || inputs.version }}
      ENSINDEXER_DOCKER_IMAGE: "ghcr.io/namehash/ensnode/ensindexer:${{ inputs.tag != '' && inputs.tag || inputs.version }}"
      ENSAPI_DOCKER_IMAGE: "ghcr.io/namehash/ensnode/ensapi:${{ inputs.tag != '' && inputs.tag || inputs.version }}"
      ENSRAINBOW_DOCKER_IMAGE: "ghcr.io/namehash/ensnode/ensrainbow:${{ inputs.tag != '' && inputs.tag || inputs.version }}"
      ENSADMIN_DOCKER_IMAGE: "ghcr.io/namehash/ensnode/ensadmin:${{ inputs.tag != '' && inputs.tag || inputs.version }}"
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID}}
      RAILWAY_TEAM_TOKEN: ${{ secrets.RAILWAY_TEAM_TOKEN }}

    steps:
      - name: Require version or tag
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -z "$INPUT_VERSION" ] && [ -z "$INPUT_TAG" ]; then
            echo "Provide at least one of: version (schema names) or tag (image tag)." >&2
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Check if Docker images exists
        run: |
          docker manifest inspect ${{ env.ENSINDEXER_DOCKER_IMAGE }} || { echo "Given docker image does not exist: ${{ env.ENSINDEXER_DOCKER_IMAGE }}"; exit 1; }
          docker manifest inspect ${{ env.ENSAPI_DOCKER_IMAGE }} || { echo "Given docker image does not exist: ${{ env.ENSAPI_DOCKER_IMAGE }}"; exit 1; }
          docker manifest inspect ${{ env.ENSRAINBOW_DOCKER_IMAGE }} || { echo "Given docker image does not exist: ${{ env.ENSRAINBOW_DOCKER_IMAGE }}"; exit 1; }
          docker manifest inspect ${{ env.ENSADMIN_DOCKER_IMAGE }} || { echo "Given docker image does not exist: ${{ env.ENSADMIN_DOCKER_IMAGE }}"; exit 1; }

      - name: Print switch target
        run: |
          echo "Deploying on: $TARGET_ENVIRONMENT"

      - name: Calculate env variables
        run: |
          case "$TARGET_ENVIRONMENT" in
            "green")
              #ENVIRONMENT
              echo "RAILWAY_ENVIRONMENT_ID=${{ secrets.GREEN_RAILWAY_ENVIRONMENT_ID }}" >> $GITHUB_ENV
              #ALPHA
              echo "ALPHA_API_SVC_ID="${{ secrets.GREEN_ALPHA_API_SVC_ID }} >> "$GITHUB_ENV"
              echo "ALPHA_INDEXER_SVC_ID="${{ secrets.GREEN_ALPHA_INDEXER_SVC_ID }} >> "$GITHUB_ENV"
              #MAINNET
              echo "MAINNET_API_SVC_ID="${{ secrets.GREEN_MAINNET_API_SVC_ID }} >> "$GITHUB_ENV"
              echo "MAINNET_INDEXER_SVC_ID="${{ secrets.GREEN_MAINNET_INDEXER_SVC_ID }} >> "$GITHUB_ENV"
              #ALPHA-SEPOLIA
              echo "ALPHA_SEPOLIA_API_SVC_ID="${{ secrets.GREEN_ALPHA_SEPOLIA_API_SVC_ID }} >> "$GITHUB_ENV"
              echo "ALPHA_SEPOLIA_INDEXER_SVC_ID="${{ secrets.GREEN_ALPHA_SEPOLIA_INDEXER_SVC_ID }} >> "$GITHUB_ENV"
              #V2-SEPOLIA
              echo "V2_SEPOLIA_API_SVC_ID="${{ secrets.GREEN_V2_SEPOLIA_API_SVC_ID }} >> "$GITHUB_ENV"
              echo "V2_SEPOLIA_INDEXER_SVC_ID="${{ secrets.GREEN_V2_SEPOLIA_INDEXER_SVC_ID }} >> "$GITHUB_ENV"
              #SEPOLIA
              echo "SEPOLIA_API_SVC_ID="${{ secrets.GREEN_SEPOLIA_API_SVC_ID }} >> "$GITHUB_ENV"
              echo "SEPOLIA_INDEXER_SVC_ID="${{ secrets.GREEN_SEPOLIA_INDEXER_SVC_ID }} >> "$GITHUB_ENV"
              #ENSRAINBOW
              echo "ENSRAINBOW_SVC_ID="${{ secrets.GREEN_ENSRAINBOW_SVC_ID }} >> "$GITHUB_ENV"
              #ENSRAINBOW SEARCHLIGHT
              echo "ENSRAINBOW_SEARCHLIGHT_SVC_ID="${{ secrets.GREEN_ENSRAINBOW_SEARCHLIGHT_SVC_ID }} >> "$GITHUB_ENV"
              #ENSADMIN
              echo "ENSADMIN_SVC_ID="${{ secrets.GREEN_ENSADMIN_SVC_ID }} >> "$GITHUB_ENV"
              echo "SLACK_TITLE=':large_green_circle: GREEN environment is now having new ENSNode version - '"${{ env.VERSION }} >> "$GITHUB_ENV"
              ;;
            "blue")
              #ENVIRONMENT
              echo "RAILWAY_ENVIRONMENT_ID=${{ secrets.BLUE_RAILWAY_ENVIRONMENT_ID }}" >> $GITHUB_ENV
              #ALPHA
              echo "ALPHA_API_SVC_ID="${{ secrets.BLUE_ALPHA_API_SVC_ID }} >> "$GITHUB_ENV"
              echo "ALPHA_INDEXER_SVC_ID="${{ secrets.BLUE_ALPHA_INDEXER_SVC_ID }} >> "$GITHUB_ENV"
              #MAINNET
              echo "MAINNET_API_SVC_ID="${{ secrets.BLUE_MAINNET_API_SVC_ID }} >> "$GITHUB_ENV"
              echo "MAINNET_INDEXER_SVC_ID="${{ secrets.BLUE_MAINNET_INDEXER_SVC_ID }} >> "$GITHUB_ENV"
              #ALPHA-SEPOLIA
              echo "ALPHA_SEPOLIA_API_SVC_ID="${{ secrets.BLUE_ALPHA_SEPOLIA_API_SVC_ID }} >> "$GITHUB_ENV"
              echo "ALPHA_SEPOLIA_INDEXER_SVC_ID="${{ secrets.BLUE_ALPHA_SEPOLIA_INDEXER_SVC_ID }} >> "$GITHUB_ENV"
              #V2-SEPOLIA
              echo "V2_SEPOLIA_API_SVC_ID="${{ secrets.BLUE_V2_SEPOLIA_API_SVC_ID }} >> "$GITHUB_ENV"
              echo "V2_SEPOLIA_INDEXER_SVC_ID="${{ secrets.BLUE_V2_SEPOLIA_INDEXER_SVC_ID }} >> "$GITHUB_ENV"
              #SEPOLIA
              echo "SEPOLIA_API_SVC_ID="${{ secrets.BLUE_SEPOLIA_API_SVC_ID }} >> "$GITHUB_ENV"
              echo "SEPOLIA_INDEXER_SVC_ID="${{ secrets.BLUE_SEPOLIA_INDEXER_SVC_ID }} >> "$GITHUB_ENV"
              #ENSRAINBOW
              echo "ENSRAINBOW_SVC_ID="${{ secrets.BLUE_ENSRAINBOW_SVC_ID }} >> "$GITHUB_ENV"
              #ENSRAINBOW SEARCHLIGHT
              echo "ENSRAINBOW_SEARCHLIGHT_SVC_ID="${{ secrets.BLUE_ENSRAINBOW_SEARCHLIGHT_SVC_ID }} >> "$GITHUB_ENV"
              #ENSADMIN
              echo "ENSADMIN_SVC_ID="${{ secrets.BLUE_ENSADMIN_SVC_ID }} >> "$GITHUB_ENV"
              echo "SLACK_TITLE=':large_blue_circle: BLUE environment is now having new ENSNode version - '"${{ env.VERSION }} >> "$GITHUB_ENV"
              ;;
            *)
              echo "Environment not recognized, skipping workflow"
              exit 1
          esac

      # Update ENSINDEXER_SCHEMA_NAME for each indexer based on the input version
      - name: Update shared environment variable
        run: |
          set_shared_variable() {
            local environment_id=$1
            local variable_name=$2
            local variable_value=$3
            echo "Setting $variable_name"
            # Railway returns HTTP 200 even when the mutation fails (error in the body's `errors`
            # array), so --fail alone misses it; inspect the body and fail loudly.
            local resp
            resp="$(curl --request POST \
              --silent \
              --fail \
              --show-error \
              --url https://backboard.railway.app/graphql/v2 \
              --header 'Authorization: Bearer '${{ env.RAILWAY_TOKEN }} \
              --header 'Content-Type: application/json' \
              --data '{"query": "mutation variableUpsert { variableUpsert(input: { projectId: \"'${{ env.RAILWAY_PROJECT_ID }}'\", environmentId: \"'${environment_id}'\", name: \"'${variable_name}'\", value: \"'${variable_value}'\" }) }"}')"
            if printf '%s' "$resp" | jq -e '.errors' >/dev/null 2>&1; then
              echo "Railway GraphQL error: $resp" >&2
              exit 1
            fi
            echo "Finished setting $variable_name"
          }

          set_shared_variable ${RAILWAY_ENVIRONMENT_ID} "ALPHA_ENSINDEXER_SCHEMA_NAME" "alphaSchema${VERSION}"
          set_shared_variable ${RAILWAY_ENVIRONMENT_ID} "MAINNET_ENSINDEXER_SCHEMA_NAME" "mainnetSchema${VERSION}"
          set_shared_variable ${RAILWAY_ENVIRONMENT_ID} "ALPHA-SEPOLIA_ENSINDEXER_SCHEMA_NAME" "alphaSepoliaSchema${VERSION}"
          set_shared_variable ${RAILWAY_ENVIRONMENT_ID} "V2-SEPOLIA_ENSINDEXER_SCHEMA_NAME" "v2SepoliaSchema${VERSION}"
          set_shared_variable ${RAILWAY_ENVIRONMENT_ID} "SEPOLIA_ENSINDEXER_SCHEMA_NAME" "sepoliaSchema${VERSION}"

      # Update images + redeploy every service in series, ENSRainbow-type services first.
      - name: Update + redeploy ENSRainbow instances
        uses: ./.github/actions/deploy_railway_services
        with:
          railway_token: ${{ env.RAILWAY_TOKEN }}
          environment_id: ${{ env.RAILWAY_ENVIRONMENT_ID }}
          image: ${{ env.ENSRAINBOW_DOCKER_IMAGE }}
          project_id: ${{ env.RAILWAY_PROJECT_ID }}
          service_ids: |
            ${{ env.ENSRAINBOW_SVC_ID }}
            ${{ env.ENSRAINBOW_SEARCHLIGHT_SVC_ID }}

      - name: Update + redeploy ENSIndexer instances
        uses: ./.github/actions/deploy_railway_services
        with:
          railway_token: ${{ env.RAILWAY_TOKEN }}
          environment_id: ${{ env.RAILWAY_ENVIRONMENT_ID }}
          image: ${{ env.ENSINDEXER_DOCKER_IMAGE }}
          project_id: ${{ env.RAILWAY_PROJECT_ID }}
          service_ids: |
            ${{ env.ALPHA_INDEXER_SVC_ID }}
            ${{ env.MAINNET_INDEXER_SVC_ID }}
            ${{ env.ALPHA_SEPOLIA_INDEXER_SVC_ID }}
            ${{ env.V2_SEPOLIA_INDEXER_SVC_ID }}
            ${{ env.SEPOLIA_INDEXER_SVC_ID }}

      - name: Update + redeploy ENSApi instances
        uses: ./.github/actions/deploy_railway_services
        with:
          railway_token: ${{ env.RAILWAY_TOKEN }}
          environment_id: ${{ env.RAILWAY_ENVIRONMENT_ID }}
          image: ${{ env.ENSAPI_DOCKER_IMAGE }}
          project_id: ${{ env.RAILWAY_PROJECT_ID }}
          service_ids: |
            ${{ env.ALPHA_API_SVC_ID }}
            ${{ env.MAINNET_API_SVC_ID }}
            ${{ env.ALPHA_SEPOLIA_API_SVC_ID }}
            ${{ env.V2_SEPOLIA_API_SVC_ID }}
            ${{ env.SEPOLIA_API_SVC_ID }}

      - name: Update + redeploy ENSAdmin instance
        uses: ./.github/actions/deploy_railway_services
        with:
          railway_token: ${{ env.RAILWAY_TOKEN }}
          environment_id: ${{ env.RAILWAY_ENVIRONMENT_ID }}
          image: ${{ env.ENSADMIN_DOCKER_IMAGE }}
          project_id: ${{ env.RAILWAY_PROJECT_ID }}
          service_ids: |
            ${{ env.ENSADMIN_SVC_ID }}

      - uses: ./.github/actions/send_slack_notification
        with:
          slack_webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          slack_title: ${{ env.SLACK_TITLE }}
          slack_message: "✅ Deploy ENSNode completed"
