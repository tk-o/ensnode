"""
Get a single an ABI changed event by address
"""
type AbiChanged implements ResolverEvent {
  """
  Concatenation of block number and log ID (exact match)
  """
  id: String!

  """
  The block number at which the event was emitted (exact match)
  """
  blockNumber: Int!

  """
  The transaction hash of the transaction in which the event was emitted (exact match)
  """
  transactionID: String!
  resolverId: String!

  """
  The content type of the ABI change (exact match)
  """
  contentType: BigInt!

  """
  Used to derive relationships to Resolvers (exact match)
  """
  resolver: Resolver
}

"""
Get a single a resolver event by address
"""
interface ResolverEvent {
  """
  Concatenation of block number and log ID (exact match)
  """
  id: String!

  """
  The block number that the event occurred on (exact match)
  """
  blockNumber: Int!

  """
  The transaction hash of the event (exact match)
  """
  transactionID: String!
  resolverId: String!
}

