services:
  ensindexer:
    extends:
      file: services/ensindexer.yml
      service: ensindexer
    environment:
      NAMESPACE: ens-test-env
    env_file:
      - path: envs/.env.docker.common
        required: true
      - path: envs/.env.docker.devnet
        required: true
      - path: envs/.env.docker.local
        required: false
    depends_on:
      ensrainbow:
        condition: service_healthy
      ensdb:
        condition: service_healthy
      devnet:
        condition: service_healthy
      efp-devnet:
        condition: service_healthy

  ensapi:
    extends:
      file: services/ensapi.yml
      service: ensapi
    depends_on:
      ensdb:
        condition: service_healthy
    env_file:
      - path: envs/.env.docker.common
        required: true
      - path: envs/.env.docker.devnet
        required: true
      - path: envs/.env.docker.local
        required: false

  ensrainbow:
    extends:
      file: services/ensrainbow.yml
      service: ensrainbow
    env_file:
      - path: envs/.env.docker.common
        required: true
      - path: envs/.env.docker.devnet
        required: true
      - path: envs/.env.docker.local
        required: false

  ensadmin:
    extends:
      file: services/ensadmin.yml
      service: ensadmin
    depends_on:
      ensapi:
        condition: service_started
    env_file:
      - path: envs/.env.docker.common
        required: true
      - path: envs/.env.docker.devnet
        required: true
      - path: envs/.env.docker.local
        required: false

  ensdb:
    extends:
      file: services/ensdb.yml
      service: ensdb
    ports:
      - "5432:5432"
    env_file:
      - path: envs/.env.docker.common
        required: true

  devnet:
    extends:
      file: services/devnet.yml
      service: devnet

  efp-devnet:
    extends:
      file: services/efp-devnet.yml
      service: efp-devnet
    ports:
      - "8001:8000"
    depends_on:
      devnet:
        condition: service_healthy

volumes:
  # Docker Compose requires volumes used by services to be declared in each
  # compose file that references them — they cannot be inherited via `extends`.
  # Explicit `name:` prevents collision with the base stack's volumes when both
  # are run from the same directory (same project name).
  ensdb_data:
    name: ensnode_devnet_ensdb_data
    driver: local
  ensrainbow_data:
    name: ensnode_devnet_ensrainbow_data
    driver: local
  efp-deployments:
    name: ensnode_devnet_efp_deployments
    driver: local
