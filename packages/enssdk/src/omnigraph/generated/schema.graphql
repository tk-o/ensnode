  sender: Address!

  """
  The UnixTimestamp indicating the moment in which this Event was emitted.
  """
  timestamp: BigInt!

  """
  Identifies the recipient of the Transaction within which this Event was emitted. Null if the transaction deployed a contract.
  """
  to: Address

  """The indexed topics of this Event's log."""
  topics: [Hex!]!

  """Identifies the Transaction within which this Event was emitted."""
  transactionHash: Hex!

  """The index of the Transaction within the Block."""
  transactionIndex: Int!
}

"""
Filter Events by `tx.from`. Not HCA-aware — use `sender` to filter by the HCA-aware actor. Exactly one of `eq` or `in` must be provided.
"""
input EventsFromFilter @oneOf {
  """Exact `tx.from` match."""
  eq: Address

  """
  `tx.from` matches any address in the set. Max 10 items. An empty set matches nothing.
  """
  in: [Address!]
}

"""
Filter Events by selector (event signature). Exactly one of `eq` or `in` must be provided.
"""
input EventsSelectorFilter @oneOf {
  """Exact selector match."""
  eq: Hex

  """
  Selector matches any value in the set. Max 10 items. An empty set matches nothing.
  """
  in: [Hex!]
}

"""
Filter Events by HCA-aware `sender` (the HCA account address if used, otherwise Transaction.from). Exactly one of `eq` or `in` must be provided.
"""
input EventsSenderFilter @oneOf {
  """Exact `sender` match."""
  eq: Address

  """
  `sender` matches any address in the set. Max 10 items. An empty set matches nothing.
  """
  in: [Address!]
}

"""
Filter Events by timestamp range. At least one bound must be provided. `gt`/`gte` are mutually exclusive; `lt`/`lte` are mutually exclusive.
"""
input EventsTimestampFilter {
  """Filter to events strictly after this UnixTimestamp."""
  gt: BigInt

  """Filter to events at or after this UnixTimestamp."""
  gte: BigInt

  """Filter to events strictly before this UnixTimestamp."""
  lt: BigInt

  """Filter to events at or before this UnixTimestamp."""
  lte: BigInt
}

"""Filter conditions for an events connection."""
input EventsWhereInput {
  """
  Filter to events whose `tx.from` matches the provided filter. Not HCA-aware — use `sender` to filter by the HCA-aware actor.
